<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>短视频片头 · 6 款风格稿</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;800;900&family=Noto+Serif+SC:wght@300;500;700&family=ZCOOL+QingKe+HuangYou&family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Anton&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #ece9e3; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#2433ff">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect x="480" y="160" width="240" height="430" rx="22" fill="#ffffff"/>
    <rect x="506" y="206" width="120" height="52" rx="8" fill="#2433ff"/>
    <rect x="506" y="280" width="188" height="52" rx="8" fill="#eaff00"/>
    <rect x="506" y="354" width="150" height="52" rx="8" fill="#ff2e88"/>
    <circle cx="540" cy="520" r="20" fill="#eaff00"/>
    <rect x="576" y="506" width="120" height="22" rx="11" fill="#dfe2ea"/>
  </svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="frames.jsx"></script>
<script type="text/babel">
const { FW, FH, Slate, Spec, F1, F2, F3, F4, F5, F6 } = window;
const AB_H = 930;

const FRAMES = [
  { id: 'pop',    label: '01 · 活力撞色大字', node: <F1 />, spec: { idx: '01', name: '活力撞色大字', en: 'POP PUNCH', fonts: 'ZCOOL 庆科黄油体 · Anton', motion: '文字逐行「砸」入卡点 · 色块横扫 · 贴纸弹跳', swatches: ['#2433ff', '#eaff00', '#ff2e88', '#ffffff'] } },
  { id: 'mono',   label: '02 · 高级黑白极简', node: <F2 />, spec: { idx: '02', name: '高级黑白极简', en: 'MINIMAL MONO', fonts: '思源宋体 Light · Space Mono', motion: '细线左右展开 · 字距渐显 · 遮罩擦除转场', swatches: ['#f4f2ec', '#15140f', '#bdb8ac'] } },
  { id: 'cyber',  label: '03 · 赛博故障霓虹', node: <F3 />, spec: { idx: '03', name: '赛博故障霓虹', en: 'CYBER GLITCH', fonts: '思源黑体 Black · Bebas Neue', motion: 'RGB 错位抖动 · 扫描线闪烁 · 网格推进', swatches: ['#06070d', '#1ff0ff', '#ff21d0'] } },
  { id: 'film',   label: '04 · 复古胶片', node: <F4 />, spec: { idx: '04', name: '复古胶片', en: 'RETRO FILM', fonts: '马善政毛笔 · Space Mono', motion: '漏光扫过 · 颗粒噪点 · 画面轻微抖动', swatches: ['#e9dcc0', '#2c2417', '#c9402e'] } },
  { id: 'aurora', label: '05 · 弥散渐变光感', node: <F5 />, spec: { idx: '05', name: '弥散渐变光感', en: 'AURORA GLOW', fonts: '思源黑体 Black · Space Mono', motion: '渐变光晕缓慢流动 · 毛玻璃卡浮入 · 字幕渐显', swatches: ['#7b5cff', '#ff5cb0', '#38e8ff', '#ffb877'] } },
  { id: 'edito',  label: '06 · 杂志编辑封面', node: <F6 />, spec: { idx: '06', name: '杂志编辑封面', en: 'EDITORIAL', fonts: '思源宋体 Bold · Bebas Neue · Space Mono', motion: '大标题逐行切入 · 巨型期号放大 · 红线擦除分栏', swatches: ['#efede7', '#141414', '#e23b2e'] } },
];

function App() {
  return (
    <DesignCanvas>
      <DCSection id="intros" title="短视频片头 · 6 款风格稿" subtitle="竖屏 9:16 · 时长约 3 秒 · 每款展示高潮定帧。把 @你的ID 与画面占位替换成你的素材即可">
        {FRAMES.map((f) => (
          <DCArtboard key={f.id} id={f.id} label={f.label} width={FW} height={AB_H}>
            <Slate frame={f.node} spec={<Spec {...f.spec} />} />
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

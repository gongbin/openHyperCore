<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>短视频片头 · 动效预览 (01 / 03)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;800;900&family=ZCOOL+QingKe+HuangYou&family=Anton&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(120% 80% at 50% 0%, #16161d, #0a0a0e 70%);
    color: #e9e7e1; font-family: 'Noto Sans SC', system-ui, sans-serif;
    min-height: 100%; display: flex; flex-direction: column; align-items: center;
    padding: 28px 20px 48px;
  }
  .head { text-align: center; margin-bottom: 22px; }
  .head h1 { font-size: 19px; font-weight: 800; letter-spacing: .01em; }
  .head p { font-size: 12.5px; color: #8b8a84; margin-top: 6px; font-family: 'Space Mono', monospace; letter-spacing: .04em; }
  .replayAll {
    margin-top: 14px; border: 1px solid #34343c; background: #1a1a20; color: #e9e7e1;
    font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: .06em;
    padding: 8px 16px; border-radius: 999px; cursor: pointer; transition: background .15s, border-color .15s;
  }
  .replayAll:hover { background: #24242c; border-color: #4a4a54; }

  .wrap { display: flex; gap: 56px; justify-content: center; align-items: flex-start; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .slot { position: relative; }
  .stage {
    width: 405px; height: 720px; position: relative; overflow: hidden;
    border-radius: 16px; transform-origin: top center;
    box-shadow: 0 30px 70px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.06);
    color: #fff;
  }
  .caprow { display: flex; align-items: center; gap: 12px; }
  .caprow .name { font-size: 13.5px; font-weight: 700; }
  .caprow .en { font-family: 'Space Mono', monospace; font-size: 10.5px; color: #7c7b75; letter-spacing: .1em; }
  .replay {
    border: 1px solid #34343c; background: #16161b; color: #cfcdc6; cursor: pointer;
    width: 30px; height: 30px; border-radius: 50%; font-size: 14px; line-height: 1;
    display: flex; align-items: center; justify-content: center; transition: background .15s, transform .3s;
  }
  .replay:hover { background: #24242c; }
  .replay:active { transform: rotate(-180deg); }

  /* ───────── 01 · POP PUNCH ───────── */
  .pop { background: #2433ff; }
  .pop .halftone { position: absolute; inset: 0; opacity: .14;
    background-image: radial-gradient(#fff 1.4px, transparent 1.6px); background-size: 16px 16px; }
  .pop .blkPink { position: absolute; top: -40px; right: -40px; width: 180px; height: 180px; background: #ff2e88; opacity: 0; }
  .pop .blkAcid { position: absolute; bottom: 120px; left: -30px; width: 120px; height: 120px; border-radius: 50%; background: #eaff00; opacity: 0; }
  .pop .toprow { position: absolute; top: 40px; left: 28px; display: flex; gap: 8px; align-items: center; }
  .pop .ep { background: #eaff00; color: #2433ff; font-family: 'Anton', sans-serif; font-size: 15px; padding: 4px 10px; letter-spacing: .04em; display: inline-block; opacity: 0; }
  .pop .topnote { font-family: 'Space Mono', monospace; font-size: 12px; color: #fff; letter-spacing: .1em; opacity: 0; }
  .pop .title { position: absolute; top: 172px; left: 26px; right: 26px; font-family: 'ZCOOL QingKe HuangYou', 'Noto Sans SC', sans-serif; line-height: .96; }
  .pop .title div { display: inline-block; white-space: nowrap; padding: 2px 12px; opacity: 0; }
  .pop .l1 { background: #fff; color: #2433ff; font-size: 84px; }
  .pop .l2 { background: #eaff00; color: #111; font-size: 84px; margin-top: 12px; }
  .pop .l3 { background: #ff2e88; color: #fff; font-size: 72px; margin-top: 12px; }
  .pop .bang { position: absolute; bottom: 150px; right: 30px; font-family: 'Anton', sans-serif; color: #eaff00; font-size: 60px; text-shadow: 4px 4px 0 #ff2e88; opacity: 0; }
  .pop .handle { position: absolute; bottom: 52px; left: 28px; display: flex; align-items: center; gap: 9px; opacity: 0; }
  .pop .handle .dot { width: 34px; height: 34px; border-radius: 50%; background: #eaff00; box-shadow: 0 0 0 2px #fff; }
  .pop .handle .id { font-weight: 800; font-size: 17px; color: #fff; }

  .pop.run .blkPink { animation: swipeP .5s .05s both; }
  .pop.run .blkAcid { animation: popR .5s .15s both; }
  .pop.run .ep      { animation: popRot .45s .25s both; }
  .pop.run .topnote { animation: riseIn .4s .32s both; }
  .pop.run .l1 { animation: slam1 .52s .38s both; }
  .pop.run .l2 { animation: slam2 .52s .54s both; }
  .pop.run .l3 { animation: slam3 .52s .70s both; }
  .pop.run .bang { animation: bang .5s .92s both; }
  .pop.run .handle { animation: riseIn .45s 1.05s both; }

  @keyframes swipeP { 0% { opacity: 0; transform: translateX(130px) rotate(18deg); } 100% { opacity: 1; transform: translateX(0) rotate(18deg); } }
  @keyframes popR  { 0% { opacity: 0; transform: scale(.2); } 70% { opacity: 1; transform: scale(1.15); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes popRot{ 0% { opacity: 0; transform: scale(.2) rotate(-3deg); } 70% { opacity: 1; transform: scale(1.12) rotate(-3deg); } 100% { opacity: 1; transform: scale(1) rotate(-3deg); } }
  @keyframes riseIn{ 0% { opacity: 0; transform: translateY(16px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes slam1 { 0% { opacity: 0; transform: translateY(-48px) scale(1.55) rotate(-2deg); } 58% { opacity: 1; transform: translateY(8px) scale(.92) rotate(-2deg); } 80% { transform: translateY(-2px) scale(1.02) rotate(-2deg); } 100% { opacity: 1; transform: translateY(0) scale(1) rotate(-2deg); } }
  @keyframes slam2 { 0% { opacity: 0; transform: translateY(-48px) scale(1.55) rotate(1.5deg); } 58% { opacity: 1; transform: translateY(8px) scale(.92) rotate(1.5deg); } 80% { transform: translateY(-2px) scale(1.02) rotate(1.5deg); } 100% { opacity: 1; transform: translateY(0) scale(1) rotate(1.5deg); } }
  @keyframes slam3 { 0% { opacity: 0; transform: translateY(-48px) scale(1.55) rotate(-1deg); } 58% { opacity: 1; transform: translateY(8px) scale(.92) rotate(-1deg); } 80% { transform: translateY(-2px) scale(1.02) rotate(-1deg); } 100% { opacity: 1; transform: translateY(0) scale(1) rotate(-1deg); } }
  @keyframes bang  { 0% { opacity: 0; transform: scale(.3) rotate(-8deg); } 60% { opacity: 1; transform: scale(1.25) rotate(-8deg); } 100% { opacity: 1; transform: scale(1) rotate(-8deg); } }

  /* ───────── 03 · CYBER GLITCH ───────── */
  .cyber { background: #06070d; }
  .cyber .gridWrap { position: absolute; left: 0; right: 0; bottom: 0; height: 280px; overflow: hidden; }
  .cyber .grid { position: absolute; inset: 0 -50% -2px;
    background-image: linear-gradient(#1ff0ff 1px, transparent 1px), linear-gradient(90deg, #1ff0ff 1px, transparent 1px);
    background-size: 40px 40px; transform: perspective(220px) rotateX(62deg); transform-origin: bottom; opacity: .5;
    animation: gridMove 1.1s linear infinite; }
  .cyber .glow { position: absolute; top: 120px; left: 50%; width: 320px; height: 320px; transform: translateX(-50%);
    background: radial-gradient(circle, #ff21d033, transparent 65%); animation: glowPulse 2.6s ease-in-out infinite; }
  .cyber .sysrow { position: absolute; top: 40px; left: 26px; right: 26px; display: flex; justify-content: space-between;
    font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: .18em; color: #1ff0ff; opacity: 0; }
  .cyber .sysrow .on { color: #ff21d0; }
  .cyber .ctitle { position: absolute; top: 250px; left: 0; right: 0; text-align: center; }
  .cyber .gword { position: relative; display: inline-block; font-family: 'Noto Sans SC', sans-serif; font-weight: 900;
    font-size: 92px; line-height: 1.02; color: #fff; opacity: 0; }
  .cyber .gword span { display: block; }
  .cyber .gword .m { position: absolute; left: -3px; top: 1px; color: #ff21d0; opacity: .85; animation: jitM 1s steps(2) infinite; }
  .cyber .gword .c { position: absolute; left: 3px; top: -1px; color: #1ff0ff; opacity: .85; animation: jitC 1.3s steps(2) infinite; }
  .cyber .gword .w { position: relative; }
  .cyber .en { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: .42em; color: #fff; margin-top: 16px; padding-left: .42em; opacity: 0; }
  .cyber .bar1 { position: absolute; top: 300px; left: 0; right: 0; height: 8px; background: #1ff0ff; opacity: 0; }
  .cyber .bar2 { position: absolute; top: 366px; left: 30px; width: 120px; height: 5px; background: #ff21d0; opacity: 0; }
  .cyber .scan { position: absolute; inset: 0; pointer-events: none;
    background-image: repeating-linear-gradient(transparent 0 2px, rgba(0,0,0,.32) 2px 4px); animation: scanFlk .12s steps(2) infinite; }
  .cyber .chandle { position: absolute; bottom: 46px; left: 0; right: 0; text-align: center;
    font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: .2em; color: #1ff0ff; opacity: 0; }

  .cyber.run .sysrow  { animation: flkIn .5s .15s both; }
  .cyber.run .gw1     { animation: glitchIn .55s .25s both; }
  .cyber.run .gw2     { animation: glitchIn .55s .48s both; }
  .cyber.run .en      { animation: fadeIn .5s .8s both; }
  .cyber.run .bar1    { animation: barFlash .6s .55s both; }
  .cyber.run .bar2    { animation: barFlash2 .6s .68s both; }
  .cyber.run .chandle { animation: fadeIn .5s 1.05s both; }

  @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 40px; } }
  @keyframes glowPulse { 0%,100% { opacity: .6; } 50% { opacity: 1; } }
  @keyframes scanFlk { 0% { opacity: .8; } 100% { opacity: 1; } }
  @keyframes jitM { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-2px,1px); } }
  @keyframes jitC { 0%,100% { transform: translate(0,0); } 50% { transform: translate(2px,-1px); } }
  @keyframes flkIn { 0% { opacity: 0; } 20% { opacity: 1; } 30% { opacity: .2; } 45% { opacity: 1; } 60% { opacity: .4; } 100% { opacity: 1; } }
  @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
  @keyframes glitchIn {
    0% { opacity: 0; transform: translateX(-14px); clip-path: inset(45% 0 45% 0); }
    18% { opacity: 1; transform: translateX(12px); clip-path: inset(0 0 62% 0); }
    34% { transform: translateX(-8px); clip-path: inset(40% 0 0 0); }
    50% { transform: translateX(6px); clip-path: inset(8% 0 30% 0); }
    68% { transform: translateX(-3px); clip-path: inset(0 0 0 0); }
    100% { opacity: 1; transform: translateX(0); clip-path: inset(0 0 0 0); }
  }
  @keyframes barFlash { 0% { opacity: 0; transform: scaleX(.2); } 30% { opacity: .8; } 60% { opacity: .12; transform: scaleX(1); } 100% { opacity: .25; transform: scaleX(1); } }
  @keyframes barFlash2 { 0% { opacity: 0; transform: scaleX(.2); } 40% { opacity: .9; } 100% { opacity: .5; transform: scaleX(1); } }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .001ms !important; }
  }
</style>
</head>
<body>
  <div class="head">
    <h1>短视频片头 · 动效预览</h1>
    <p>01 活力撞色 · 03 赛博故障 &nbsp;|&nbsp; 约 3 秒一轮 · 自动循环</p>
    <button class="replayAll" id="replayAll">⟳ 重播全部</button>
  </div>

  <div class="wrap">
    <div class="col">
      <div class="slot"><div class="stage pop" id="pop">
        <div class="halftone"></div>
        <div class="blkPink"></div>
        <div class="blkAcid"></div>
        <div class="toprow">
          <span class="ep">EP.07</span>
          <span class="topnote">// 美食探店</span>
        </div>
        <div class="title">
          <div class="l1">今天</div>
          <div class="l2">到底</div>
          <div class="l3">吃什么</div>
        </div>
        <div class="bang">!?</div>
        <div class="handle"><span class="dot"></span><span class="id">@你的ID</span></div>
      </div></div>
      <div class="caprow">
        <span class="name">01 · 活力撞色大字</span>
        <span class="en">POP PUNCH</span>
        <button class="replay" data-target="pop" title="重播">⟳</button>
      </div>
    </div>

    <div class="col">
      <div class="slot"><div class="stage cyber" id="cyber">
        <div class="gridWrap"><div class="grid"></div></div>
        <div class="glow"></div>
        <div class="sysrow"><span>SYSTEM //</span><span class="on">● ONLINE</span></div>
        <div class="ctitle">
          <div class="gword gw1"><span class="m">未来</span><span class="c">未来</span><span class="w">未来</span></div>
          <div class="gword gw2"><span class="m">已来</span><span class="c">已来</span><span class="w">已来</span></div>
          <div class="en">THE FUTURE IS NOW</div>
        </div>
        <div class="bar1"></div>
        <div class="bar2"></div>
        <div class="scan"></div>
        <div class="chandle">@你的ID</div>
      </div></div>
      <div class="caprow">
        <span class="name">03 · 赛博故障霓虹</span>
        <span class="en">CYBER GLITCH</span>
        <button class="replay" data-target="cyber" title="重播">⟳</button>
      </div>
    </div>
  </div>

<script>
  const pop = document.getElementById('pop');
  const cyber = document.getElementById('cyber');

  function run(el) {
    el.classList.remove('run');
    void el.offsetWidth;       // force reflow so the animation restarts
    el.classList.add('run');
  }
  function runAll() { run(pop); run(cyber); }

  // fit two 405×720 stages into the viewport
  function fit() {
    const cols = window.innerWidth < 940 ? 1 : 2;
    const avW = (window.innerWidth - 40 - (cols === 2 ? 56 : 0)) / cols;
    const avH = window.innerHeight - 230;
    const s = Math.min(1, avW / 405, avH / 720);
    document.querySelectorAll('.stage').forEach((st) => {
      st.style.transform = 'scale(' + s + ')';
      st.closest('.slot').style.width = (405 * s) + 'px';
      st.closest('.slot').style.height = (720 * s) + 'px';
    });
  }
  window.addEventListener('resize', fit);
  fit();

  document.querySelectorAll('.replay').forEach((b) =>
    b.addEventListener('click', () => run(document.getElementById(b.dataset.target))));
  document.getElementById('replayAll').addEventListener('click', runAll);

  // kick off + loop every 3.8s
  runAll();
  setInterval(runAll, 3800);
</script>
</body>
</html>
